server:
  port: 8080

spring:
  application:
    name: skill-admin-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:skill_admin}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:codex-skill-admin-demo-secret-codex-skill-admin-demo}
    expiration-hours: 12

logging:
  level:
    org.springframework.security: info
